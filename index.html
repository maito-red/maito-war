<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>まいと戦争</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #4a9aea; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
#toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.95); color: #f44; font-size: 22px; font-weight: bold;
  padding: 20px 40px; border-radius: 8px; border: 3px solid #f44;
  z-index: 99999; display: none; text-align: center;
  pointer-events: none;
}
@keyframes toastFade {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; }
}
button {
  border: 2px solid #ffd700; border-radius: 4px;
  background: linear-gradient(180deg, #1a1a2a, #2a2a3a);
  color: #ffd700; cursor: pointer; font-weight: bold;
  box-shadow: 0 3px 0 #996600, inset 0 0 10px rgba(255,215,0,0.1);
  transition: all 0.15s;
}
button:hover { border-color: #ffe44d; box-shadow: 0 3px 0 #996600, 0 0 10px rgba(255,215,0,0.3); }
button:active { transform: translateY(2px); box-shadow: 0 1px 0 #996600; }
canvas { display: block; }
#ui {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.85);
  border-top: 2px solid #444;
  display: flex; align-items: center; justify-content: center;
  padding: 10px 20px; gap: 12px;
}
.unit-btn {
  width: 80px; height: 90px; border: 2px solid #555; border-radius: 4px;
  background: linear-gradient(180deg, #2a2a4a, #1a1a3a);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  transition: all 0.15s;
  position: relative;
}
.unit-btn:hover { border-color: #88f; transform: translateY(-3px); }
.unit-btn:active { transform: translateY(0); }
.unit-btn .icon { font-size: 32px; }
.unit-btn .name { color: #ccc; font-size: 11px; }
.unit-btn .cost { color: #ffd700; font-size: 12px; font-weight: bold; }
.unit-btn.disabled { opacity: 0.4; cursor: not-allowed; }
.unit-btn .cooldown-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7); border-radius: 0 0 8px 8px;
  transition: height 0.1s;
}
#info {
  position: fixed; top: 10px; left: 10px; right: 10px;
  display: flex; justify-content: space-between; align-items: center;
  color: white; font-size: 16px; pointer-events: none;
}
#gold-display { color: #ffd700; font-size: 20px; font-weight: bold; }
#hp-container {
  display: flex; gap: 20px;
}
.hp-bar-wrapper {
  display: flex; align-items: center; gap: 8px;
}
.hp-bar {
  width: 200px; height: 20px; background: #333; border-radius: 4px;
  overflow: hidden; border: 1px solid #555;
}
.hp-bar-fill {
  height: 100%; transition: width 0.3s; border-radius: 4px;
}
.hp-label { font-size: 13px; }
#wave-display { color: #aaf; font-size: 18px; font-weight: bold; text-align: center; }
#game-over {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; color: white; z-index: 10;
}
#game-over h1 { font-size: 48px; margin-bottom: 20px; }
#game-over button {
  padding: 12px 30px; font-size: 20px; margin: 6px;
}

/* Menu Screen */
#menu-screen {
  position: fixed; inset: 0; z-index: 20;
  background: linear-gradient(180deg, #5ab8ff, #3a8eea);
  display: flex; flex-direction: column; align-items: center;
}
#menu-title {
  font-size: 36px; font-weight: bold; color: white;
  text-shadow: 3px 3px 0 #2a5aaa;
  margin-top: 16px; margin-bottom: 8px;
}
#menu-content {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; width: 100%; max-width: 600px; padding: 20px;
}
#menu-castle {
  width: 180px; height: 180px; margin-bottom: 12px;
}
#play-btn {
  padding: 14px 50px; font-size: 24px; border-radius: 4px;
  margin-bottom: 16px;
}

/* Equip grid */
#equip-section {
  width: 100%; max-width: 600px; padding: 10px 20px; margin-bottom: 10px;
}
#equip-section h3 {
  color: white; font-size: 16px; margin-bottom: 10px; text-align: center;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
#equip-grid, #equip-grid-page {
  display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
  gap: 8px;
}
#equip-section-page {
  width: 100%; max-width: 600px; padding: 10px 20px;
}
#equip-section-page h3 {
  color: white; font-size: 16px; margin-bottom: 10px; text-align: center;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
}
.equip-card {
  height: 80px; background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 2px solid #c8a020; border-radius: 4px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4); transition: all 0.15s;
}
.equip-card:hover { border-color: #ffd700; transform: translateY(-2px); }
.equip-card .icon { font-size: 30px; }
.equip-card .name { font-size: 11px; color: #ffd700; font-weight: bold; }
.equip-card.empty { border-style: dashed; opacity: 0.5; }
.equip-card.empty::after { content: '＋'; font-size: 24px; color: #c8a020; }

/* Bottom Nav */
#bottom-nav {
  display: flex; width: 100%; background: #111;
  border-top: 3px solid #c8a020; padding: 2px;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 10px 4px;
  gap: 2px; margin: 4px;
}
.nav-btn.active { background: #2a2a2a; box-shadow: 0 3px 0 #996600, 0 0 10px rgba(255,215,0,0.4); }
.nav-btn .nav-icon { font-size: 24px; }
.nav-btn .nav-label { font-size: 11px; color: #fff; font-weight: bold; }
.nav-btn.active .nav-label { color: #fff; }

/* Sub pages */
.menu-page {
  display: none; flex: 1; flex-direction: column; align-items: center;
  justify-content: flex-start; width: 100%; max-width: 600px;
  padding: 20px; overflow-y: auto; min-height: 0;
}
#page-home { overflow-y: auto; }

/* Player info bar */
#player-info {
  width: 100%; display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 2px solid #c8a020; border-radius: 4px; padding: 10px 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.4);
}
#profile-modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000;
  justify-content: center; align-items: center;
}
#profile-modal-overlay.show { display: flex; }
#profile-modal {
  width: 85vw; max-width: 420px; aspect-ratio: 1;
  background: linear-gradient(180deg, #1a1a2a, #0d0d1a);
  border: 2px solid #ffd700; border-radius: 8px;
  padding: 0; display: flex; flex-direction: column; gap: 0;
  justify-content: center; overflow: hidden;
}
#player-info .avatar { font-size: 36px; }
#player-info .details { flex: 1; color: white; }
#player-info .details .player-name { font-size: 16px; font-weight: bold; color: #ffd700; }
#player-info .details .player-rank { font-size: 11px; color: #aaa; margin-top: 2px; }
#player-info .currency { display: flex; gap: 12px; font-size: 14px; font-weight: bold; }
#player-info .currency span { display: flex; align-items: center; gap: 4px; }
.exp-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 4px; }
.exp-bar-fill { height: 100%; width: 35%; background: linear-gradient(90deg, #4af, #48f); border-radius: 3px; }

/* Daily missions */
#daily-missions {
  width: 100%; margin-bottom: 10px;
}
#daily-missions h3 {
  color: #ffd700; font-size: 14px; margin-bottom: 6px;
}
.mission-item {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 1px solid #555; border-radius: 4px; padding: 8px 12px; margin-bottom: 4px;
}
.mission-item .mission-icon { font-size: 20px; }
.mission-item .mission-text { flex: 1; color: #ccc; font-size: 12px; }
.mission-item .mission-progress { color: #ffd700; font-size: 11px; font-weight: bold; }
.mission-item .mission-reward {
  font-size: 11px; color: #111; background: #ffd700; padding: 2px 8px;
  border-radius: 3px; font-weight: bold; cursor: pointer;
}
.mission-item.done { opacity: 0.5; }
.mission-item.done .mission-reward { background: #666; color: #999; cursor: default; }

/* Notice banner */
#notice-banner {
  width: 100%; background: linear-gradient(90deg, #c8a020, #ffd700);
  border-radius: 4px; padding: 8px 14px; margin-bottom: 10px;
  color: #111; font-size: 13px; font-weight: bold; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 2px 8px rgba(255,215,0,0.3);
}
#notice-banner:hover { filter: brightness(1.1); }

/* Stamina bar */
#stamina-bar-wrapper {
  width: 100%; margin-bottom: 10px;
}
#stamina-bar-wrapper .stamina-label {
  color: #4f4; font-size: 12px; font-weight: bold; margin-bottom: 3px;
  display: flex; justify-content: space-between;
}
#stamina-bar {
  width: 100%; height: 8px; background: #333; border-radius: 4px;
  border: 1px solid #4a4;
}
#stamina-bar-fill {
  height: 100%; width: 80%; background: linear-gradient(90deg, #4f4, #2d2);
  border-radius: 4px;
}

/* Profile button - top left */
#profile-btn {
  position: fixed; top: 16px; left: 16px; z-index: 30;
  width: 44px; height: 44px; border-radius: 50%;
  font-size: 24px; padding: 0;
  display: flex; align-items: center; justify-content: center;
}

/* Mission button - top right of menu-screen */
#mission-btn {
  position: fixed; top: 16px; right: 116px; z-index: 30;
  background: none; border: none; padding: 0; cursor: pointer;
  width: 100px; height: 100px; box-shadow: none;
}
#mission-btn img { width: 100%; height: 100%; object-fit: contain; }
#mission-btn:hover { transform: scale(1.1); }
#mission-btn:active { transform: scale(0.95); }
#mission-btn .badge {
  position: absolute; top: -4px; right: -4px;
  background: #f44; color: white; font-size: 11px; padding: 1px 6px;
  border-radius: 10px; min-width: 18px; text-align: center;
}

/* Mission modal */
#mission-modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 1000;
  justify-content: center; align-items: center;
}
#mission-modal-overlay.show { display: flex; }
#mission-modal {
  width: 90%; max-width: 500px; max-height: 80vh;
  background: linear-gradient(180deg, #1a1a2a, #0d0d1a);
  border: 2px solid #c080ff; border-radius: 8px;
  overflow: hidden; display: flex; flex-direction: column;
}
#mission-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid #333;
}
#mission-modal-header h2 { color: #c080ff; font-size: 20px; margin: 0; }
#mission-close-btn {
  font-size: 18px; width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
#mission-tabs {
  display: flex; border-bottom: 1px solid #333;
}
.mission-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 13px;
  border-radius: 0; box-shadow: none;
  border-bottom: 2px solid transparent;
}
.mission-tab.active { border-bottom-color: #ffd700; background: #2a2a3a; }
.mission-tab:hover { box-shadow: none; }
#mission-modal-body {
  padding: 12px 16px; overflow-y: auto; flex: 1;
}
.modal-mission-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; background: #1a1a2a; border: 1px solid #333;
  border-radius: 4px; margin-bottom: 6px;
}
.modal-mission-item .m-icon { font-size: 24px; }
.modal-mission-item .m-info { flex: 1; }
.modal-mission-item .m-name { font-size: 13px; color: white; font-weight: bold; }
.modal-mission-item .m-desc { font-size: 11px; color: #888; margin-top: 2px; }
.modal-mission-item .m-progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 4px; }
.modal-mission-item .m-progress-fill { height: 100%; border-radius: 2px; background: #c080ff; }
.modal-mission-item .m-reward-btn {
  padding: 6px 12px; border: 1px solid #ffd700; border-radius: 4px;
  background: linear-gradient(180deg, #ffd700, #cc9900);
  color: #111; font-size: 11px; font-weight: bold; cursor: pointer;
  white-space: nowrap;
}
.modal-mission-item .m-reward-btn.claimed {
  background: #333; border-color: #555; color: #777; cursor: default;
}
.modal-mission-item .m-reward-btn:not(.claimed):hover { filter: brightness(1.1); }

/* Login bonus */
#login-bonus {
  width: 100%; margin-bottom: 10px;
}
#login-bonus h3 { color: #ffd700; font-size: 14px; margin-bottom: 6px; }
.login-days {
  display: flex; gap: 4px;
}
.login-day {
  flex: 1; text-align: center; padding: 6px 2px;
  background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 1px solid #555; border-radius: 4px; font-size: 10px; color: #aaa;
}
.login-day .day-num { font-size: 9px; color: #888; }
.login-day .day-reward { font-size: 18px; margin: 2px 0; }
.login-day .day-label { font-size: 9px; color: #ccc; }
.login-day.claimed { border-color: #4f4; background: linear-gradient(135deg, #1a2a1a, #2a3a2a); }
.login-day.claimed .day-label { color: #4f4; }
.login-day.today { border-color: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.4); }
.login-day.today .day-label { color: #ffd700; }

/* Event banner */
.event-banner {
  width: 100%; border-radius: 4px; padding: 12px 14px; margin-bottom: 8px;
  font-size: 13px; font-weight: bold; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.event-banner:hover { filter: brightness(1.1); }
.event-banner.event-raid {
  background: linear-gradient(90deg, #d32, #f44);
  color: white;
}
.event-banner.event-collab {
  background: linear-gradient(90deg, #38c, #4af);
  color: white;
}

/* Friend list */
#friend-activity {
  width: 100%; margin-bottom: 10px;
}
#friend-activity h3 { color: #ffd700; font-size: 14px; margin-bottom: 6px; }
.friend-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: #1a1a2a; border-radius: 4px; margin-bottom: 3px;
  border: 1px solid #333;
}
.friend-row .friend-avatar { font-size: 22px; }
.friend-row .friend-info { flex: 1; }
.friend-row .friend-name { font-size: 12px; color: white; font-weight: bold; }
.friend-row .friend-status { font-size: 10px; color: #888; }
.friend-row .friend-online { width: 8px; height: 8px; border-radius: 50%; }
.friend-row .friend-online.on { background: #4f4; box-shadow: 0 0 4px #4f4; }
.friend-row .friend-online.off { background: #555; }

/* Achievement progress */
#achievement-preview {
  width: 100%; margin-bottom: 10px;
  background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 1px solid #555; border-radius: 4px; padding: 10px 14px;
}
#achievement-preview h3 { color: #ffd700; font-size: 14px; margin-bottom: 6px; }
.achievement-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.achievement-row .ach-icon { font-size: 18px; }
.achievement-row .ach-info { flex: 1; }
.achievement-row .ach-name { font-size: 11px; color: #ccc; }
.ach-progress-bar { width: 100%; height: 5px; background: #333; border-radius: 3px; margin-top: 2px; }
.ach-progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #ffd700, #fa0); }
.achievement-row .ach-pct { font-size: 10px; color: #aaa; white-space: nowrap; }

/* Battle record */
#battle-record {
  width: 100%; margin-bottom: 10px;
}
#battle-record h3 { color: #ffd700; font-size: 14px; margin-bottom: 6px; }
.record-stats {
  display: flex; gap: 6px;
}
.record-stat {
  flex: 1; text-align: center; padding: 10px 4px;
  background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 1px solid #555; border-radius: 4px;
}
.record-stat .stat-value { font-size: 22px; font-weight: bold; color: #ffd700; }
.record-stat .stat-label { font-size: 10px; color: #aaa; margin-top: 2px; }
.menu-page.active { display: flex; }
.menu-page h2 { color: white; font-size: 24px; margin-bottom: 16px; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }

/* Level up page */
.levelup-card {
  width: 100%; background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 2px solid #c8a020; border-radius: 4px;
  padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,215,0,0.1);
  transition: all 0.15s;
}
.levelup-card:hover { border-color: #ffd700; transform: translateY(-2px); }
.levelup-card .icon { font-size: 38px; background: rgba(255,215,0,0.1); border-radius: 4px; padding: 8px; }
.levelup-card .info { flex: 1; color: white; }
.levelup-card .info .name { font-size: 16px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
.levelup-card .info .stats { font-size: 12px; color: #aaa; margin-top: 2px; }
.levelup-btn {
  padding: 10px 18px; font-size: 14px;
}

/* Gacha page */
#page-gacha {
  overflow: hidden; touch-action: none;
  justify-content: center;
}
#gacha-area {
  text-align: center; width: 100%;
}
.gacha-btn {
  padding: 12px 32px; font-size: 18px; margin: 20px;
  touch-action: none;
}
#gacha-wrapper {
  position: relative; display: inline-block; margin: 0 auto 20px;
  width: 280px;
}
#gacha-machine {
  display: block; width: 100%;
  cursor: pointer;
}
#gacha-handle-img {
  position: absolute;
  /* The handle was cropped from (260,1450) to (800,1850) of a 1471x2048 image */
  /* So in % of full image: left=17.7%, top=70.8%, width=36.7%, height=19.5% */
  /* Compensated for new clip center (47%,56%) so visible knob stays in same screen position */
  left: 15.1%; top: 70.9%;
  width: 36.7%;
  cursor: pointer;
  /* The handle png has red background + extra body bits — clip to just the knob circle */
  /* Knob bbox in handle png (540x400): center ~(252,225) → 47%, 56%; radius ~186px → ~39% */
  clip-path: circle(39% at 47% 56%);
  transform-origin: 47% 56%;
}
#gacha-handle-img.turning { animation: spinKnob 0.6s linear; }
@keyframes spinKnob {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
#gacha-result {
  font-size: 24px; margin: 2px; min-height: 30px;
}

/* Shop page */
.shop-item {
  width: 100%; background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
  border: 2px solid #c8a020; border-radius: 4px;
  padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,215,0,0.1);
  transition: all 0.15s;
}
.shop-item:hover { border-color: #ffd700; transform: translateY(-2px); box-shadow: 0 5px 12px rgba(0,0,0,0.5), 0 0 8px rgba(255,215,0,0.2); }
.shop-item .icon { font-size: 38px; background: rgba(255,215,0,0.1); border-radius: 4px; padding: 8px; }
.shop-item .info { flex: 1; color: white; }
.shop-item .info .name { font-size: 16px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
.shop-item .info .desc { font-size: 12px; color: #aaa; margin-top: 2px; }
.buy-btn {
  padding: 10px 18px; font-size: 13px;
}
#shop-tabs {
  display: flex; gap: 8px; margin-bottom: 16px; width: 100%;
}
.shop-tab {
  flex: 1; padding: 10px 8px; font-size: 13px;
}
.shop-tab.active { background: #2a2a2a; box-shadow: 0 3px 0 #996600, 0 0 8px rgba(255,215,0,0.4); }
</style>
</head>
<body>
<div id="menu-screen">
  <button id="profile-btn" onclick="toggleProfile()">😤</button>
  <button id="mission-btn" onclick="openMissionModal()">
    <img src="ミッションボタン.png" alt="ミッション">
    <span class="badge">3</span>
  </button>
  <div id="menu-title">まいと戦争</div>

  <!-- Home Page -->
  <div class="menu-page active" id="page-home">

    <!-- Notice Banner -->
    <div id="notice-banner">
      📢 新キャラ「王様」登場！ピックアップガチャ開催中！
    </div>

    <!-- Stamina -->
    <div id="stamina-bar-wrapper">
      <div class="stamina-label">
        <span>⚡ スタミナ</span>
        <span>40 / 50</span>
      </div>

let gold, allyBaseHp, enemyBaseHp, wave, units, enemies, projectiles, particles;
let goldTimer, waveTimer, gameOver, cooldowns, enemySpawnQueue;

function initGame() {
  gold = 100;
  allyBaseHp = MAX_BASE_HP;
  enemyBaseHp = MAX_BASE_HP;
  wave = 1;
  units = [];
  enemies = [];
  projectiles = [];
  particles = [];
  goldTimer = 0;
  waveTimer = 0;
  gameOver = false;
  cooldowns = {};
  enemySpawnQueue = [];
  UNIT_TYPES.forEach(u => cooldowns[u.id] = 0);
  spawnWave();
  document.getElementById('game-over').style.display = 'none';
}

function spawnWave() {
  enemySpawnQueue = [];
  const count = 3 + wave * 2;
  for (let i = 0; i < count; i++) {
    let pool;
    if (wave <= 2) pool = ENEMY_TYPES.slice(0, 2);
    else if (wave <= 4) pool = ENEMY_TYPES.slice(0, 3);
    else if (wave <= 6) pool = ENEMY_TYPES.slice(0, 4);
    else pool = ENEMY_TYPES;

    const type = pool[Math.floor(Math.random() * pool.length)];
    const hpMult = 1 + (wave - 1) * 0.15;
    const atkMult = 1 + (wave - 1) * 0.1;
    enemySpawnQueue.push({
      delay: i * 1200,
      type: { ...type, hp: Math.floor(type.hp * hpMult), atk: Math.floor(type.atk * atkMult) }
    });
  }
  document.getElementById('wave-display').textContent = `WAVE ${wave}`;
}

function allyBaseX() { return 190; }
function enemyBaseX() { return canvas.width - 190; }

function spawnUnit(type) {
  if (gold < type.cost || cooldowns[type.id] > 0) return;
  gold -= type.cost;
  cooldowns[type.id] = type.cooldown;
  units.push({
    ...type, x: allyBaseX() + BASE_WIDTH / 2 + 20, y: groundY(),
    currentHp: type.hp, lastAtk: 0, side: 'ally'
  });
}

function spawnEnemy(type) {
  enemies.push({
    ...type, x: enemyBaseX(), y: groundY(),
    currentHp: type.hp, maxHp: type.hp, lastAtk: 0, side: 'enemy'
  });
}

function addProjectile(from, to, color) {
  projectiles.push({ x: from.x, y: from.y - 15, tx: to.x, ty: to.y - 15, color, speed: 5, life: 1 });
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1, color, size: Math.random() * 3 + 1
    });
  }
}

function addDamageText(x, y, dmg, color) {
  particles.push({
    x, y: y - 20, vx: 0, vy: -1,
    life: 1, color, size: 0, text: `-${dmg}`
  });
}

function findTarget(entity, opponents) {
  let closest = null, minDist = Infinity;
  for (const opp of opponents) {
    const d = Math.abs(entity.x - opp.x);
    if (d < minDist) { minDist = d; closest = opp; }
  }
  return closest;
}

let lastTime = 0;
function update(time) {
  if (gameOver) return;
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;

  // Gold generation
  goldTimer += dt;
  if (goldTimer >= 1000) { gold += 10 + wave * 2; goldTimer -= 1000; }

  // Cooldowns
  for (const id in cooldowns) {
    if (cooldowns[id] > 0) cooldowns[id] = Math.max(0, cooldowns[id] - dt);
  }

  // Enemy spawn queue
  waveTimer += dt;
  for (let i = enemySpawnQueue.length - 1; i >= 0; i--) {
    if (waveTimer >= enemySpawnQueue[i].delay) {
      spawnEnemy(enemySpawnQueue[i].type);
      enemySpawnQueue.splice(i, 1);
    }
  }

  // Next wave
  if (enemySpawnQueue.length === 0 && enemies.length === 0) {
    wave++;
    waveTimer = 0;
    gold += 50;
    spawnWave();
  }

  const now = time;

  // Update ally units
  for (const unit of units) {
    const target = findTarget(unit, enemies);
    const distToBase = enemyBaseX() - unit.x;
    if (target && Math.abs(unit.x - target.x) <= unit.range) {
      if (now - unit.lastAtk >= unit.atkSpeed) {
        unit.lastAtk = now;
        target.currentHp -= unit.atk;
        addDamageText(target.x, target.y, unit.atk, '#ff0');
        if (unit.range > 60) addProjectile(unit, target, unit.color);
        addParticles(target.x, target.y, '#ff4', 3);
      }
    } else if (distToBase > BASE_WIDTH / 2) {
      unit.x += unit.speed * (dt / 16);
    } else {
      if (now - unit.lastAtk >= unit.atkSpeed) {
        unit.lastAtk = now;
        enemyBaseHp -= unit.atk;
        addParticles(enemyBaseX(), groundY(), '#f44', 5);
      }
    }
  }

  // Update enemies
  for (const enemy of enemies) {
    const target = findTarget(enemy, units);
    const distToBase = enemy.x - allyBaseX();
    if (target && Math.abs(enemy.x - target.x) <= enemy.range) {
      if (now - enemy.lastAtk >= enemy.atkSpeed) {
        enemy.lastAtk = now;
        target.currentHp -= enemy.atk;
        addDamageText(target.x, target.y, enemy.atk, '#f44');
        if (enemy.range > 60) addProjectile(enemy, target, enemy.color);
        addParticles(target.x, target.y, '#f44', 3);
      }
    } else if (distToBase > BASE_WIDTH / 2) {
      enemy.x -= enemy.speed * (dt / 16);
    } else {
      if (now - enemy.lastAtk >= enemy.atkSpeed) {
        enemy.lastAtk = now;
        allyBaseHp -= enemy.atk;
        addParticles(allyBaseX(), groundY(), '#4af', 5);
      }
    }
  }

  // Remove dead
  units = units.filter(u => {
    if (u.currentHp <= 0) { addParticles(u.x, u.y, u.color, 8); return false; }
    return true;
  });
  enemies = enemies.filter(e => {
    if (e.currentHp <= 0) {
      addParticles(e.x, e.y, e.color, 8);
      gold += 10 + wave * 3;
      return false;
    }
    return true;
  });

  // Projectiles
  for (const p of projectiles) {
    const dx = p.tx - p.x, dy = p.ty - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < p.speed * 2) { p.life = 0; continue; }
    p.x += (dx / dist) * p.speed * (dt / 16);
    p.y += (dy / dist) * p.speed * (dt / 16);
  }
  projectiles = projectiles.filter(p => p.life > 0);

  // Particles
  for (const p of particles) {
    p.x += p.vx * (dt / 16);
    p.y += p.vy * (dt / 16);
    p.life -= 0.02 * (dt / 16);
  }
  particles = particles.filter(p => p.life > 0);

  // Check win/lose
  if (allyBaseHp <= 0) { endGame(false); }
  if (enemyBaseHp <= 0) { endGame(true); }

  // Update UI
  document.getElementById('gold-display').textContent = `💰 ${gold}`;
  updateButtons();
}

function endGame(won) {
  gameOver = true;
  const overlay = document.getElementById('game-over');
  overlay.style.display = 'flex';
  document.getElementById('result-text').textContent = won ? '🎉 勝利！' : '💀 敗北...';
  document.getElementById('result-text').style.color = won ? '#4f4' : '#f44';

    advanceMission('a_battle', 1);

    setMissionProgress('a_rich', totalGoldEarned);
  } else {
    winStreak = 0;
    setMissionProgress('a_winstreak', 0);
  }
  if (wave >= 5) setMissionProgress('w_wave', 1);
}

function drawBase(x, gy, isEnemy) {
  const img = isEnemy ? enemyCastleImg : allyCastleImg;
  const dw = 360, dh = 360;
  if (img.complete && img.naturalWidth > 0) {
    ctx.save();
    if (isEnemy) {
      ctx.translate(x, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(img, -dw/2, gy - dh + 45, dw, dh);
    } else {
      ctx.drawImage(img, x - dw/2, gy - dh + 45, dw, dh);
    }
    ctx.restore();
  }
  // HP bar above the castle
  const hp = isEnemy ? enemyBaseHp : allyBaseHp;
  const hpPct = Math.max(0, hp / MAX_BASE_HP);
  const barW = 120, barH = 14;
  const barX = x - barW / 2;
  const barY = gy - dh + 20;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = isEnemy ? '#f44' : '#4af';
  ctx.fillRect(barX, barY, barW * hpPct, barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${Math.max(0, Math.ceil(hp))} / ${MAX_BASE_HP}`, x, barY + barH / 2);
}

function drawUnit(entity, isEnemy) {
  const sc = (entity.size || 1) * 1.0;
  const x = entity.x, y = entity.y;
  const dir = isEnemy ? -1 : 1;
  const t = performance.now();
  const isAtk = (t - entity.lastAtk) < 300 && entity.lastAtk > 0;
  const walk = Math.sin(t / 120 + entity.x) * (isAtk ? 0 : 3 * sc);
  const cc = entity.color;

  // Special: 勇者 uses hero sprite
  if (entity.id === 'hero' && !isEnemy) {
    const heroOrder = [1, 0, 2, 0, 1, 0, 2, 0];
    const heroFrame = heroWalkImgs[heroOrder[Math.floor(t / 280) % 8]];
    if (heroFrame.complete && heroFrame.naturalWidth > 0) {
      const h = 85;
      const w = h * (heroFrame.naturalWidth / heroFrame.naturalHeight);
      ctx.save();
      ctx.translate(x, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(heroFrame, -w/2, y - h, w, h);
      ctx.restore();
      const hpRatio = entity.currentHp / (entity.maxHp || entity.hp);
      if (hpRatio < 1) {
        const bw = 20;
        ctx.fillStyle = '#111';
        ctx.fillRect(x - bw/2, y - h - 6, bw, 3);
        ctx.fillStyle = hpRatio > 0.5 ? '#0c0' : hpRatio > 0.25 ? '#cc0' : '#c00';
        ctx.fillRect(x - bw/2, y - h - 6, bw * hpRatio, 3);
      }
      return;
    }
  }

  // Special: じぶん uses walking sprite
  if (entity.id === 'self' && !isEnemy) {
    const order = [1, 0, 2, 0, 1, 0, 2, 0];
    const frame = selfWalkImgs[order[Math.floor(t / 280) % 8]];
    if (frame.complete && frame.naturalWidth > 0) {
      const h = 85;
      const w = h * (frame.naturalWidth / frame.naturalHeight);
      ctx.save();
      ctx.translate(x, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(frame, -w/2, y - h, w, h);
      ctx.restore();
      // HP bar
      const hpRatio = entity.currentHp / (entity.maxHp || entity.hp);
      if (hpRatio < 1) {
        const bw = 20;
        ctx.fillStyle = '#111';
        ctx.fillRect(x - bw/2, y - h - 6, bw, 3);
        ctx.fillStyle = hpRatio > 0.5 ? '#0c0' : hpRatio > 0.25 ? '#cc0' : '#c00';
        ctx.fillRect(x - bw/2, y - h - 6, bw * hpRatio, 3);
      }
      return;
    }
  }

  ctx.lineCap = 'round';

  // Legs
  ctx.strokeStyle = cc; ctx.lineWidth = 3 * sc;
  ctx.beginPath();
  ctx.moveTo(x - 2*sc, y - 9*sc); ctx.lineTo(x - 3*sc + walk, y);
  ctx.moveTo(x + 2*sc, y - 9*sc); ctx.lineTo(x + 3*sc - walk, y);
  ctx.stroke();

  // Body
  ctx.fillStyle = cc;
  ctx.fillRect(x - 4*sc, y - 18*sc, 8*sc, 9*sc);

  // Arms
  const aSwing = isAtk ? 6*sc*dir : walk;
  ctx.strokeStyle = cc; ctx.lineWidth = 2.5*sc;
  ctx.beginPath();
  ctx.moveTo(x - 4*sc, y - 16*sc); ctx.lineTo(x - 7*sc - aSwing, y - 10*sc);
  ctx.moveTo(x + 4*sc, y - 16*sc); ctx.lineTo(x + 7*sc + aSwing, y - 10*sc);
  ctx.stroke();

  // Head
  ctx.fillStyle = '#f0c8a0';
  ctx.beginPath(); ctx.arc(x, y - 22*sc, 5*sc, 0, Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle = isEnemy ? '#333' : '#2a1508';
  ctx.beginPath(); ctx.arc(x, y - 23.5*sc, 5*sc, Math.PI, Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = isEnemy ? '#c22' : '#236';
  ctx.fillRect(x - 3*sc, y - 23*sc, 2*sc, 2*sc);
  ctx.fillRect(x + 1*sc, y - 23*sc, 2*sc, 2*sc);

  // HP bar
  const hpRatio = entity.currentHp / (entity.maxHp || entity.hp);
  if (hpRatio < 1) {
    const bw = 12*sc;
    ctx.fillStyle = '#111';
    ctx.fillRect(x - bw/2, y - 30*sc, bw, 2*sc);
    ctx.fillStyle = hpRatio > 0.5 ? '#0c0' : hpRatio > 0.25 ? '#cc0' : '#c00';
    ctx.fillRect(x - bw/2, y - 30*sc, bw * hpRatio, 2*sc);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const gy = groundY();

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, gy);
  sky.addColorStop(0, '#1a3a6a');
  sky.addColorStop(1, '#4a8abf');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, gy);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i = 0; i < 5; i++) {
    const cx = ((performance.now() / 80 + i * 300) % (canvas.width + 200)) - 100;
    ctx.beginPath(); ctx.ellipse(cx, 60 + i*30, 60, 20, 0, 0, Math.PI*2); ctx.fill();
  }

  // Ground - dirt base
  ctx.fillStyle = '#8b5a2b';
  ctx.fillRect(0, gy, canvas.width, canvas.height - gy);
  // Grass with jagged bottom edge
  const grassH = 16;
  const toothW = 14;
  const toothH = 10;
  ctx.fillStyle = '#4ea54e';
  ctx.beginPath();
  ctx.moveTo(0, gy);
  ctx.lineTo(canvas.width, gy);
  let i = 0;
  for (let x = canvas.width; x >= 0; x -= toothW / 2) {
    const y = gy + grassH + (i % 2 === 0 ? toothH : 0);
    ctx.lineTo(x, y);
    i++;
  }
  ctx.closePath();
  ctx.fill();
  // Grass top line
  ctx.strokeStyle = '#2a5a2a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();

  // Castles
  drawBase(allyBaseX(), gy, false);
  drawBase(enemyBaseX(), gy, true);

  // Units
  for (const u of units) drawUnit(u, false);
  for (const e of enemies) drawUnit(e, true);

  // Projectiles
  for (const p of projectiles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    if (p.text) {
      ctx.fillStyle = p.color;
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function gameLoop(time) {
  update(time);
  draw();
  requestAnimationFrame(gameLoop);
}

    equippedUnits.push(unit);

function saveGame() {
  const missionState = {};
  for (const [tab, list] of Object.entries(MISSIONS)) {
    missionState[tab] = list.map(m => ({ id: m.id, progress: m.progress, claimed: !!m.claimed }));
  }
  const data = {
    playerGems, playerGold, stamina, gachaTickets, selectedCastle,
    totalGoldEarned, winStreak, totalBattles,
    collectedChars: [...collectedChars],
    equippedIds: equippedUnits.map(u => u.id),
    missions: missionState,
    unitLevels: UNIT_TYPES.reduce((o, u) => { if (u._level) o[u.id] = u._level; return o; }, {}),
  };
  localStorage.setItem('maito_war_save', JSON.stringify(data));
}

function loadGame() {
  const raw = localStorage.getItem('maito_war_save');
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    playerGems = data.playerGems ?? 30;
    playerGold = data.playerGold ?? 1200;
    stamina = data.stamina ?? 40;
    gachaTickets = data.gachaTickets ?? 3;
    if (data.selectedCastle) {
      selectedCastle = data.selectedCastle;
      document.getElementById('menu-castle').src = selectedCastle;
      const profileImg = document.querySelector('#profile-modal img');
      if (profileImg) profileImg.src = selectedCastle;
    }
    totalGoldEarned = data.totalGoldEarned ?? 0;
    winStreak = data.winStreak ?? 0;
    totalBattles = data.totalBattles ?? 0;
    collectedChars = new Set(data.collectedChars || []);
    if (data.equippedIds) {
      equippedUnits = data.equippedIds.map(id => UNIT_TYPES.find(u => u.id === id)).filter(Boolean);
    }
    if (data.unitLevels) {
      for (const [id, lvl] of Object.entries(data.unitLevels)) {
        const u = UNIT_TYPES.find(u => u.id === id);
        if (u) {
          const baseLvl = u._level || 1;
          for (let i = baseLvl; i < lvl; i++) {
            u.hp = Math.floor(u.hp * 1.15);
            u.atk = Math.floor(u.atk * 1.1);
          }
          u._level = lvl;
        }
      }
    }
    if (data.missions) {
      for (const [tab, list] of Object.entries(data.missions)) {
        if (MISSIONS[tab]) {
          list.forEach(saved => {
            const m = MISSIONS[tab].find(m => m.id === saved.id);
            if (m) { m.progress = saved.progress; m.claimed = saved.claimed; }
          });
        }
      }
    }
    updateCurrencyDisplay();
    updateStaminaDisplay();
    updateMissionBadge();
  } catch(e) { console.error('loadGame error:', e); }
}

// loadGame is called after all functions are defined (at end of script)

function advanceMission(id, amount) {
  for (const tab of Object.values(MISSIONS)) {
    const m = tab.find(m => m.id === id);
    if (m && !m.claimed) {
      m.progress = Math.min(m.progress + amount, m.goal);
    }
  }
  updateHomeMissions();
  updateMissionBadge();
  if (document.getElementById('mission-modal-overlay').classList.contains('show')) {
    renderMissions(currentMissionTab);
  }
  saveGame();
}

function setMissionProgress(id, value) {
  for (const tab of Object.values(MISSIONS)) {
    const m = tab.find(m => m.id === id);
    if (m && !m.claimed) {
      m.progress = Math.min(value, m.goal);
    }
  }
  updateHomeMissions();
  updateMissionBadge();
}

function claimReward(tabName, index) {
  const m = MISSIONS[tabName][index];
  if (!m || m.claimed || m.progress < m.goal) return;
  m.claimed = true;
  if (m.rewardGold) playerGold += m.rewardGold;
  if (m.rewardGem) playerGems += m.rewardGem;
  updateCurrencyDisplay();
  updateHomeMissions();
  updateMissionBadge();
  renderMissions(currentMissionTab);
  saveGame();
}

function updateCurrencyDisplay() {
  const modal = document.getElementById('profile-modal');
  if (modal) {
    const spans = modal.querySelectorAll('.currency span');
    if (spans[0]) spans[0].textContent = '💰 ' + playerGold.toLocaleString();
    if (spans[1]) spans[1].textContent = '💎 ' + playerGems;
    if (spans[2]) spans[2].textContent = '🎫 ' + gachaTickets;
  }
  updateStaminaDisplay();
}

function updateStaminaDisplay() {
  const label = document.querySelector('#stamina-bar-wrapper .stamina-label');
  if (label) label.lastElementChild.textContent = `${stamina} / ${MAX_STAMINA}`;
  const fill = document.getElementById('stamina-bar-fill');
  if (fill) fill.style.width = `${stamina / MAX_STAMINA * 100}%`;
}

function updateMissionBadge() {
  let claimable = 0;
  for (const tab of Object.values(MISSIONS)) {
    for (const m of tab) {
      if (m.progress >= m.goal && !m.claimed) claimable++;
    }
  }
  const badge = document.querySelector('#mission-btn .badge');
  if (badge) {
    badge.textContent = claimable;
    badge.style.display = claimable > 0 ? '' : 'none';
  }
}

function updateHomeMissions() {
  const container = document.getElementById('daily-missions');
  if (!container) return;
  const dailies = MISSIONS.daily;
  let html = '<h3>📋 デイリーミッション</h3>';
  dailies.forEach(m => {
    const done = m.progress >= m.goal;
    const cls = m.claimed ? 'mission-item done' : 'mission-item';
    html += `<div class="${cls}">
      <span class="mission-icon">${m.icon}</span>
      <span class="mission-text">${m.name}</span>
      <span class="mission-progress">${m.progress}/${m.goal}</span>
      <span class="mission-reward">${m.claimed ? '済' : (done ? '受取可!' : m.reward)}</span>
    </div>`;
  });
  container.innerHTML = html;
}

function openMissionModal() {
  document.getElementById('mission-modal-overlay').classList.add('show');
  currentMissionTab = 'daily';
  document.querySelectorAll('.mission-tab').forEach((t, i) => {
    t.classList.toggle('active', i === 0);
  });
  renderMissions('daily');
}
function closeMissionModal() {
  document.getElementById('mission-modal-overlay').classList.remove('show');
}
function switchMissionTab(tab) {
  currentMissionTab = tab;
  document.querySelectorAll('.mission-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderMissions(tab);
}
function renderMissions(tab) {
  const body = document.getElementById('mission-modal-body');
  const missions = MISSIONS[tab];
  body.innerHTML = missions.map((m, i) => {
    const pct = Math.min(100, m.progress / m.goal * 100);
    const done = m.progress >= m.goal;
    const claimed = m.claimed;
    let btnText = claimed ? '受取済' : m.reward;
    let btnClass = claimed ? 'claimed' : '';
    let btnAttr = '';
    if (!done && !claimed) btnAttr = 'disabled style="opacity:0.4"';
    if (done && !claimed) btnAttr = `onclick="claimReward('${tab}',${i})"`;
    return `<div class="modal-mission-item">
      <span class="m-icon">${m.icon}</span>
      <div class="m-info">
        <div class="m-name">${m.name}</div>
        <div class="m-desc">${m.desc} (${m.progress}/${m.goal})</div>
        <div class="m-progress-bar"><div class="m-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <button class="m-reward-btn ${btnClass}" ${btnAttr}>${btnText}</button>
    </div>`;
  }).join('');
}
// Initialize: load save, then rebuild UI
try {
  loadGame();
  buildEquipGrid();
  buildEquipGridPage();
  buildLevelUpList();
  buildShopList();
  updateCurrencyDisplay();
  updateStaminaDisplay();
  updateMissionBadge();
} catch(e) { console.error('Init error:', e); }
</script>
